services:
  agent:
    build: .
    container_name: ai-news-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      - agent-data:/app/data
      - ./user_config:/app/user_config:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: RSSHub for Twitter/X feed access
  # Uncomment to enable
  # rsshub:
  #   image: diygod/rsshub:latest
  #   container_name: rsshub
  #   restart: unless-stopped
  #   ports:
  #     - "1200:1200"
  #   environment:
  #     - NODE_ENV=production
  #     - CACHE_TYPE=memory

volumes:
  agent-data:
